<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailWind CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="border-2 border-black rounded mt-20 mx-52 flex flex-wrap">
        <div class="font-semibold text-3xl bg-gradient-to-r from-sky-500 to-indigo-500 text-white h-32 flex justify-center items-center w-full">
            News you can Trust.
        </div>
        <div class="text-center mt-6 w-full">
            <h3 class="font-semibold text-2xl">Stay up to date with the Latest!</h3>
            <p class="font-medium text-xl"></p>Subscribe to our newsletter for the latest news straight into your inbox</p>
            <form class="flex flex-wrap">
                <input placeholder="you@example.com" class="w-full mx-52 bg-slate-200 text-center placeholder:text-sm my-4 py-2 rounded">
                <button class="bg-blue-500 text-white p-2 w-full mx-52 rounded-full">Subscribe Now</button>
            </form>
            <p class="mx-8 mt-6 text-">We value your privacy</p>
        </div>
    </div>
  </body>
</html>
